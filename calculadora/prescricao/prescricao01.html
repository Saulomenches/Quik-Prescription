<body>
    <!------------------------------Navegador--------------------------------------->
     <nav class="navegador">
  <h1 id="titulo">

    <main>
       <!------------------------------ Container ----------------------------------->
    <div class="container">
        <label for="viaAdm"><strong>Via de administração</strong> </label>
             <select  name="viaAdm" id="viaAdm" onchange="mostrarVia()">
               <option value=""></option>
               <option value="USO ORAL">Uso Oral</option>
               <option value="USO TÓPICO">Uso Tópico</option>
               <option value="USO OTOLÓGICO">Uso Otológico</option>
               <option value="USO OFTÁLMICO">Uso Oftálmico</option>
             </select> 

   
        <label for="medicamentos"><strong>Medicamentos</strong> </label>

        <select name="medicamentos" id="medicamentos" onchange="mostrarMedicacao()">
            <option value=""></option>
            <option value="Dipirona gotas">Dipirona Gotas</option>
            <option value="Dipirona 500 mg">Dipirona 500 mg</option>
            <option value="Dipirona 1 g">Dipirona 1 g</option>
            <option value="Tramadol 100mg/ml">Cloridrato de Tramadol 100 mg/ml</option>
            <option value="Meloxicam 0,2 mg">Meloxicam 0,2 mg</option>
            <option value="Meloxicam 0,5 mg">Meloxicam 0,5 mg</option>
            <option value="Meloxicam 2 mg">Meloxicam 2 mg</option>
            <option value="Vonau 4 mg">Vonau 4 mg</option>
            <option value="Vonau 8 mg">Vonau 8 mg</option>
        </select>



           <label for="farmacia"  id="labelFarmacia"><strong>Farmácia</strong> </label>
        
          <select name="farmacia" id="farmacia" onchange="farmacia()">
           <option value=""></option>
                     <option value="Farmacia Humana">Farmácia Humana</option>
                     <option value="Farmacia Veterinaria">Farmácia Veterinária</option>
          </select> 


        

        <label for="quantidadeMed"><strong>Quantidade</strong> </label>
        <input type="text" id="quantidadeMed" name="quantidadeMed" oninput="quantidadeMed()">
        
          
  

     <label for="apresentacaoMed"><strong>Apresentação</strong> </label>

        <select name="apresentacaoMed" id="apresentacaoMed" onchange="apresentacaoMed()">
           <option value=""></option>
           <option value="ml">ml</option>
           <option value="gotas">gotas</option>
           <option value="gota">gota</option>
           <option value="comprimido">comprimido</option>
           <option value="comprimidos">comprimidos</option>
        </select> 


        <label for="tempoAdm"  id="tempo"><strong>Tempo de uso</strong> </label>
        
          <select name="tempoAdm" id="tempoAdm" onchange="tempoAdm()">
           <option value=""></option>
           <option value="a cada">a cada</option>
        </select> 
 
      

        <label for="horaAdm" class="Hora-label"><strong>Horas</strong></label>
        <select name="horaAdm" id="horaAdm" onchange="horaAdm()">
           <option value=""></option>
           <option value="4 horas">4 horas</option>
           <option value="6 horas">6 horas</option>
           <option value="8 horas">8 horas</option>
           <option value="12 horas">12 horas</option>
           <option value="24 horas">24 horas</option>
        </select>

 

          <label for="duracaoAdm" class="duracao-label"><strong>Duração</strong></label>

           <select name="duracaoAdm" id="duracaoAdm" onchange="duracaoAdm()">
              <option value=""></option>
              <option value="durante">durante</option>
              <option value="até novas recomendações">até novas recomendações</option>
           </select> 

    

            <label for="diasFinais" class="diasFinais-label"><strong>Dias</strong></label>
            <input type="number" id="diasFinais" oninput="diasFinais()">
              
          

            
        
            <div id="respostaviaAdm"></div>
            <div id="respostaMedicamentos"></div>
            <div id="respostaquantidadeMed"></div>
            <div id="respostaApresentacao"></div>
            <div id="respostaTempoAdm"></div>
            <div id="respostaHoraAdm"></div>
            <div id="respostaDuracaoAdm"></div>
            <div id="respostaFinalDias"></div>
            <div id="prescricaoFinal"> </div> 
            <br>
            <br>

             

            <button id="submitTexto" onclick="somaPrescricao ()">Enviar Prescrição</button>

        
        
              </main>

              <section id="sessao">
                

        <div class="prescricao">

            <p id="areaPrescricao">oi</p>

        </div>


              </section>
           </div>   

         
    
        <script>
            // estado centralizado: guarda valores sem mostrar imediatamente
            const state = {
                viaAdm: '',
                medicamentos: '',
                farmacia: '',
                quantidadeMed: '',
                apresentacaoMed: '',
                tempoAdm: '',
                horaAdm: '',
                duracaoAdm: '',
                diasFinais: ''
            }

                function mostrarVia() {
                const viaAdm = document.getElementById("viaAdm").value
                // atualiza apenas o estado; não mostra imediatamente
                state.viaAdm = viaAdm || ''
                }

                function mostrarMedicacao() {
                const medicamentos = document.getElementById("medicamentos").value
                // guarda no estado; não atualiza a UI agora
                state.medicamentos = medicamentos || ''
                }
                function farmacia() {
                    const farmacia = document.getElementById("farmacia").value
                    // armazena no state; somente será mostrado ao enviar
                    state.farmacia = farmacia || ''
                }
                

                      function quantidadeMed() {
                    let quantidadeMed = document.getElementById("quantidadeMed").value
                    let respostaquantidadeMed = document.getElementById("respostaquantidadeMed")
                                        state.quantidadeMed = quantidadeMed || ''
                 }      

                      function apresentacaoMed() {
                          const apresentacaoMed = document.getElementById("apresentacaoMed").value
                          state.apresentacaoMed = apresentacaoMed || ''
                      }
                      function tempoAdm () {
                          const tempoAdm = document.getElementById("tempoAdm").value
                          state.tempoAdm = tempoAdm || ''
                      }
                      function horaAdm () {
                          const horaAdm = document.getElementById("horaAdm").value
                          state.horaAdm = horaAdm || ''
                      }
                                 function duracaoAdm () {
                                     const duracaoAdm = document.getElementById("duracaoAdm").value
                                     state.duracaoAdm = duracaoAdm || ''
                                 }
                      function diasFinais () {
                          const diasFinais = document.getElementById("diasFinais").value
                          state.diasFinais = diasFinais || ''
                          }
                    let listasPrescricoes = []
                                function somaPrescricao () {
                                    // usar valores do estado (state) — os handlers já preencheram o state
                                    const viaAdm = state.viaAdm
                                    const medicamentos = state.medicamentos
                                    const farmacia = state.farmacia
                                    const quantidadeMed = state.quantidadeMed
                                    const apresentacaoMed = state.apresentacaoMed
                                    const tempoAdm = state.tempoAdm
                                    const horaAdm = state.horaAdm
                                    const duracaoAdm = state.duracaoAdm
                                    const diasFinais = state.diasFinais
                                    const prescricaoFinal = document.getElementById("prescricaoFinal")

                                    if (!prescricaoFinal) return

                                    // montar texto a partir do state
                                    const linha1 = viaAdm ? `<strong>${viaAdm}</strong>` : ''

                                    // formatar label da farmácia (com acento) usando if/else para ficar mais legível
                                    let farmaciaDisplay = ''
                                    if (farmacia === 'Farmacia Humana') {
                                        farmaciaDisplay = 'Farmácia Humana'
                                    } else if (farmacia === 'Farmacia Veterinaria') {
                                        farmaciaDisplay = 'Farmácia Veterinária'
                                    }

                                    let farmaciaLabel = ''
                                    if (farmaciaDisplay) {
                                        farmaciaLabel = ` (${farmaciaDisplay})`
                                    }

                                    // montar linha2 e linha3 usando if/else ao invés de ternário aninhado
                                    let linha2 = ''
                                    if (medicamentos) {
                                        linha2 = `<p><strong>${medicamentos}</strong>${farmaciaLabel}</p>`
                                    }

                                    let linha3 = ''
                                    if (quantidadeMed || apresentacaoMed || horaAdm || diasFinais) {
                                        linha3 = `<p>Dê ${quantidadeMed || ''} ${apresentacaoMed || ''}${tempoAdm ? ', ' + tempoAdm : ''}${horaAdm ? ', ' + horaAdm : ''}${duracaoAdm ? ' durante ' + duracaoAdm : ''}${diasFinais ? ' por ' + diasFinais + ' dias' : ''}.</p>`
                                    }

                                    prescricaoFinal.innerHTML += `${linha1}${linha2}${linha3}`
                                }

                    
        </script>
